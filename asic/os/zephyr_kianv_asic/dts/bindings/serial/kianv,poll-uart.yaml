description: KianV polling MMIO UART

compatible: "kianv,poll-uart"

include: uart-controller.yaml

properties:
  reg:
    required: true

  reg-names:
    required: true

  kianv,divisor1:
    type: int
    default: 1000
    description: High-word divider used by the KianV UART divider register.
